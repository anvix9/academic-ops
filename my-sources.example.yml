# ALERTS — Keywords to watch for across ALL sources
# ============================================================
# Additional keywords beyond your profile. Useful for tracking
# specific grants, programs, or emerging opportunities.
alert_keywords:
  # Example:
  # - "ERC starting grant postdoc"
  # - "CIFAR AI chairs"
  # - "Helmholtz AI postdoc"
  # - "Schmidt Futures fellowship"
