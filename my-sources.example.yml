# ============================================================
# TWITTER/X & SOCIAL (scraped via WebSearch, not Playwright)
# ============================================================
# PIs or accounts that post openings. Auto mode searches for
# recent posts from these accounts mentioning position keywords.
social_accounts:
  # Example:
  # - handle: "@ChrisManningNLP"
  #   platform: twitter
  #   field: "NLP"
  #   notes: "Sometimes posts postdoc openings"

  # - handle: "@ylaboratory"
