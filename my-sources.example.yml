# ============================================================
# MY SOURCES — Your Personal Watchlist
# ============================================================
#
# This is YOUR list. Add anything here — lab pages, niche boards,
# Twitter/X accounts, mailing lists, department pages, etc.
#
# Auto mode scans BOTH the base portals (portals.yml) AND this file.
# Keep your personal finds here so they don't get overwritten
# when the base portals get updated.
#
# Usage:
#   "Add this lab to my sources" → Claude edits this file
#   "Watch this department page" → Claude adds it here
#   "Track Dr. Smith's lab for openings" → Claude adds it here
#
# ============================================================

# ============================================================
# LABS I'M WATCHING
# ============================================================
# These are specific labs you're interested in.
# Auto mode checks their "join us" / "openings" pages each run.
labs:
  # Example:
  # - name: "Manning NLP Group"
  #   pi: "Prof. Christopher Manning"
  #   institution: "Stanford"
  #   url: https://nlp.stanford.edu
  #   openings_page: https://nlp.stanford.edu/join/       # checked each scan
  #   field: "NLP"
  #   priority: high    # high | medium | low — high = always scan, low = scan monthly
  #   notes: "Check for postdoc openings in efficient NLP"

  # - name: "Bengio's Mila Lab"
  #   pi: "Prof. Yoshua Bengio"
  #   institution: "Université de Montréal / Mila"
  #   url: https://mila.quebec
  #   openings_page: https://mila.quebec/en/careers/
  #   field: "deep learning"
  #   priority: high

# ============================================================
# DEPARTMENT PAGES
# ============================================================
