# ============================================================
# CUSTOM URLS
# ============================================================
# Any other URLs you want checked — conference job boards,
# Google Sheets with postdoc listings, Reddit threads, etc.
custom:
  # Example:
  # - name: "NeurIPS 2026 Job Board"
  #   url: https://neurips.cc/Conferences/2026/JobBoard
  #   type: seasonal      # seasonal | permanent
  #   active_months: [9, 10, 11, 12]  # only scan Sep-Dec
  #   notes: "Active around conference time"

  # - name: "Reddit r/MachineLearning hiring thread"
  #   url: https://www.reddit.com/r/MachineLearning/search?q=hiring+thread
