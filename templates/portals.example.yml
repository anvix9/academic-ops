# Academic-Ops Portal Configuration
# Copy this file to portals.yml and customize for your field

# ============================================================
# AGGREGATOR PORTALS — Multi-institution job boards
# ============================================================
portals:

  # --- Global ---
  - name: EURAXESS
    url: https://euraxess.ec.europa.eu/jobs/search
    type: aggregator
    region: Europe
    levels: [R1, R2, R3]  # R1=early, R2=recognized, R3=established
    notes: "Best for European positions. Filter by research field and career stage."

  - name: AcademicJobsOnline
    url: https://academicjobsonline.org/ajo/jobs
    type: aggregator
    region: Global
    notes: "Strong for US/Canada postdocs. Many top universities post here."

  - name: jobs.ac.uk
    url: https://www.jobs.ac.uk
    type: aggregator
    region: UK
    notes: "UK-focused but includes some European positions."

  - name: AcademicTransfer
    url: https://www.academictransfer.com/en/jobs/
    type: aggregator
    region: Netherlands/Europe
    notes: "Dutch universities, but also Belgium, Germany."

  - name: HigherEdJobs
    url: https://www.higheredjobs.com
    type: aggregator
    region: USA
    notes: "US-focused, good for research positions."

  - name: ScholarshipDB
    url: https://scholarshipdb.net
    type: aggregator
    region: Global
    notes: "Scholarships and funded PhD/postdoc positions."

  # --- Discipline-Specific ---
  - name: mathjobs.org
    url: https://www.mathjobs.org/jobs
    type: discipline
    fields: [mathematics, statistics, applied math, data science]

  - name: PhysicsToday Jobs
    url: https://jobs.physicstoday.org
    type: discipline
    fields: [physics, astronomy, astrophysics]

  - name: Nature Careers
    url: https://www.nature.com/naturecareers
    type: discipline
    fields: [biology, chemistry, physics, medicine, interdisciplinary]

  - name: Science Careers (AAAS)
    url: https://jobs.sciencecareers.org
    type: discipline
    fields: [biology, chemistry, engineering, medicine]

  - name: Computing Research Association
    url: https://cra.org/ads/
    type: discipline
    fields: [computer science, information science]

  # --- AI / ML / NLP / CV / Robotics ---
  - name: AI Jobs Board
    url: https://aijobs.net
    type: ai
    fields: [AI, machine learning, deep learning, NLP, computer vision]

  - name: NeurIPS Job Board
    url: https://neurips.cc/Conferences/2026/JobBoard
    type: ai
    seasonal: true
    active_months: [9, 10, 11, 12, 1]
    fields: [machine learning, deep learning, AI, reinforcement learning]
    notes: "Active around NeurIPS season. Top labs post here."

  - name: ICML Job Board
    url: https://icml.cc/virtual/2026/jobs
    type: ai
    seasonal: true
    active_months: [4, 5, 6, 7]
    fields: [machine learning, optimization, deep learning]

  - name: ACL Rolling Review Jobs
    url: https://aclrollingreview.org/jobs
    type: ai
    fields: [NLP, computational linguistics, language models]

  - name: Robotics Worldwide Jobs
    url: https://robotics-worldwide.org/jobs
    type: ai
    fields: [robotics, autonomous systems, control, manipulation]

  - name: AAAI Job Board
    url: https://aaai.org/career-center/
    type: ai
    fields: [artificial intelligence, knowledge representation, planning]

  - name: MLOps Community Jobs
    url: https://mlops.community/jobs/
    type: ai
    fields: [MLOps, ML engineering, production ML]
    notes: "More applied/engineering but some research positions"

# ============================================================
# COMMUNITY SPREADSHEETS — Crowd-sourced opening lists
# ============================================================
# These are Google Sheets maintained by the research community
# where professors self-list their openings. GOLD for finding
# positions not posted on any portal.
community_sheets:
  - name: "PhD/RA/Interns Opening 2026"
    url: https://docs.google.com/spreadsheets/d/1vcEUT_5bXYFQgIzVKpsMQlYmV2xv15VtLXq2rvXZqRk/htmlview#gid=0
    type: community_sheet
    fields: [AI, NLP, ML, computer vision, robotics]
    update_frequency: "daily — professors self-list"
    notes: >
      THE go-to community spreadsheet for AI/NLP/ML positions.
      Professors post their own PhD, RA, and intern openings here.
      Updated frequently. Check this FIRST — many positions here
      never appear on any formal portal. Auto mode downloads and
      parses this sheet each run.
    priority: high
    scan_method: "csv_export"
    csv_url: "https://docs.google.com/spreadsheets/d/1vcEUT_5bXYFQgIzVKpsMQlYmV2xv15VtLXq2rvXZqRk/export?format=csv&gid=0"

  # Add more community sheets here as they appear:
  # - name: "Graduate Admissions 2025-2026"
  #   url: https://docs.google.com/spreadsheets/d/...
  #   type: community_sheet

