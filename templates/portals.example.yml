    positions: [postdoc, research scientist, visiting researcher]
    notes: "Top Japanese AI research center."

  - name: KAIST AI
    url: https://gsai.kaist.ac.kr/
    type: ai_institute
    region: South Korea
    positions: [postdoc, PhD, research professor]

  - name: Stanford HAI
    url: https://hai.stanford.edu/careers
    type: ai_institute
    positions: [postdoc, research scientist]
    notes: "Human-Centered AI Institute"

  - name: MIT CSAIL
    url: https://www.csail.mit.edu/about/job-openings
    type: ai_institute
    positions: [postdoc, research scientist, research engineer]

  - name: Berkeley AI Research (BAIR)
    url: https://bair.berkeley.edu/
    type: ai_institute
