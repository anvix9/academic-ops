    positions: [researcher, postdoc, research intern]
    notes: "MSR labs worldwide. Strong postdoc and intern programs."

  - name: Apple ML Research
    url: https://machinelearning.apple.com/work-with-us
    type: ai_lab
    positions: [research scientist, ML engineer, intern]

  - name: NVIDIA Research
    url: https://www.nvidia.com/en-us/research/careers/
