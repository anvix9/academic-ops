# ============================================================
# SEARCH QUERIES (used on aggregator sites)
# ============================================================
queries:
  # These are populated from your profile.yml research.keywords
  # Add custom queries here if needed
  custom: []

# ============================================================
# FILTERS
# ============================================================
title_filter:
  positive:
    - postdoc
    - postdoctoral
    - research assistant
    - research associate
    - lab intern
    - research intern
    - visiting researcher
    - visiting scholar
    - PhD student
    - doctoral researcher
    - research fellow
    - junior researcher
  negative:
    - full professor
    - associate professor
    - assistant professor
    - lecturer
    - senior lecturer
    - administrative
    - technician
    - IT support
    - secretary

deadline_filter:
  # Skip positions with deadlines before this date
  min_days_remaining: 7
