  # --- Academic AI Institutes ---
  - name: Mila (Montréal)
    url: https://mila.quebec/en/careers/
    type: ai_institute
    positions: [postdoc, PhD intern, research associate]
    notes: "Yoshua Bengio's institute. Top for deep learning, RL, generative models."

  - name: Vector Institute (Toronto)
    url: https://vectorinstitute.ai/careers/
    type: ai_institute
    positions: [postdoc, research scientist, applied ML]
